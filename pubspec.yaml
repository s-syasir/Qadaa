name: qadaa
description: "Islamic prayer debt tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  sqflite: ^2.4.2
  path: ^1.9.1
  adhan: ^2.0.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  home_widget: ^0.7.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  file_picker: ^9.0.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  assets:
    - assets/cities.json
